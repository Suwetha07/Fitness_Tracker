name: fitness-tracker-app CI/CD

on:
  push:
    branches: [ "master" ]   
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          organization: Suwetha B    
          projectKey: suwetha07
        
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      

      - name: Build Docker Image
        run: docker build -t fitness-app .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Image
        run: docker tag fitness-app suwetha07/fitness-app:latest

      - name: Push Image
        run: docker push suwetha07/fitness-app:latest