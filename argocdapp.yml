apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitnessargocd-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/suwetha07/https://github.com/Suwetha07/Fitness_Tracker.git
    targetRevision: master
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: fitness

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
